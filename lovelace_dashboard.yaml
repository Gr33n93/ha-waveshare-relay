###############################################################################
# Waveshare PoE Relay – Lovelace Dashboard
# ─────────────────────────────────────────────────────────────────────────────
# Einbinden:  HA → Einstellungen → Dashboards → + Dashboard → YAML-Modus
# Oder als View in ein bestehendes Dashboard kopieren.
#
# HINWEIS: Entity-IDs passen sich dem Gerätenamen an.
#   Standard-Prefix: switch.waveshare_relay_*  /  sensor.waveshare_relay_*
#   Falls abweichend → in HA unter Geräte & Dienste → Waveshare Relay
#   die tatsächlichen Entity-IDs nachschauen und hier anpassen.
###############################################################################

title: Waveshare Relay
views:
  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 1: Relais-Steuerung
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Relais
    path: relais
    icon: mdi:electric-switch
    cards:

      # ── Verbindungsstatus ──
      - type: entity
        entity: binary_sensor.waveshare_relay_verbindung
        name: Board-Verbindung
        icon: mdi:lan-connect

      # ── 8 Relais als Grid ──
      - type: grid
        columns: 4
        square: true
        cards:
          - type: button
            entity: switch.waveshare_relay_relais_1
            name: Relais 1
            icon: mdi:electric-switch
            show_state: true
            tap_action:
              action: toggle
          - type: button
            entity: switch.waveshare_relay_relais_2
            name: Relais 2
            icon: mdi:electric-switch
            show_state: true
            tap_action:
              action: toggle
          - type: button
            entity: switch.waveshare_relay_relais_3
            name: Relais 3
            icon: mdi:electric-switch
            show_state: true
            tap_action:
              action: toggle
          - type: button
            entity: switch.waveshare_relay_relais_4
            name: Relais 4
            icon: mdi:electric-switch
            show_state: true
            tap_action:
              action: toggle
          - type: button
            entity: switch.waveshare_relay_relais_5
            name: Relais 5
            icon: mdi:electric-switch
            show_state: true
            tap_action:
              action: toggle
          - type: button
            entity: switch.waveshare_relay_relais_6
            name: Relais 6
            icon: mdi:electric-switch
            show_state: true
            tap_action:
              action: toggle
          - type: button
            entity: switch.waveshare_relay_relais_7
            name: Relais 7
            icon: mdi:electric-switch
            show_state: true
            tap_action:
              action: toggle
          - type: button
            entity: switch.waveshare_relay_relais_8
            name: Relais 8
            icon: mdi:electric-switch
            show_state: true
            tap_action:
              action: toggle

      # ── Notaus ──
      - type: button
        name: "⚡ ALLE AUS"
        icon: mdi:power-off
        tap_action:
          action: call-service
          service: waveshare_relay.alle_aus
          confirmation:
            text: Wirklich alle 8 Relais ausschalten?

  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 2: Statistik & Monitoring
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Statistik
    path: statistik
    icon: mdi:chart-bar
    cards:

      # ── Verbindung & Reaktionszeit ──
      - type: entities
        title: Verbindung
        show_header_toggle: false
        entities:
          - entity: binary_sensor.waveshare_relay_verbindung
            name: Status
          - entity: sensor.waveshare_relay_reaktionszeit
            name: Reaktionszeit
          - entity: sensor.waveshare_relay_letzter_erfolg_zeit
            name: Letzter Erfolg
          - entity: sensor.waveshare_relay_letzter_fehler_zeit
            name: Letzter Fehler

      # ── Reaktionszeit Graph ──
      - type: history-graph
        title: Reaktionszeit (Verlauf)
        hours_to_show: 24
        entities:
          - entity: sensor.waveshare_relay_reaktionszeit
            name: ms

      # ── Abfragen ──
      - type: entities
        title: Abfragen (Lesen)
        show_header_toggle: false
        entities:
          - entity: sensor.waveshare_relay_abfragen_gesamt
            name: Gesamt
          - entity: sensor.waveshare_relay_abfragen_erfolgreich
            name: Erfolgreich
          - entity: sensor.waveshare_relay_abfragen_fehlgeschlagen
            name: Fehlgeschlagen

      # ── Schreibvorgänge ──
      - type: entities
        title: Schreibvorgänge
        show_header_toggle: false
        entities:
          - entity: sensor.waveshare_relay_schreibvorgange_gesamt
            name: Gesamt
          - entity: sensor.waveshare_relay_schreiben_erfolgreich
            name: Erfolgreich
          - entity: sensor.waveshare_relay_schreiben_fehlgeschlagen
            name: Fehlgeschlagen

      # ── Letzte Fehlermeldung ──
      - type: entity
        entity: sensor.waveshare_relay_letzte_fehlermeldung
        name: Letzte Fehlermeldung
        icon: mdi:message-alert

      # ── Reset-Button ──
      - type: button
        name: Statistik zurücksetzen
        icon: mdi:restart
        tap_action:
          action: call-service
          service: waveshare_relay.statistik_zuruecksetzen
          confirmation:
            text: Alle Zähler und Dauer-Werte auf 0 zurücksetzen?

