  # ═══════════════════════════════════════════════════════════════════════════
  # VIEW 4: Funktionstest
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Funktionstest
    path: funktionstest
    icon: mdi:test-tube
    cards:

      # ── Status ──
      - type: entity
        entity: sensor.waveshare_relay_funktionstest
        name: Funktionstest Status

      # ── Start (Standard) ──
      - type: button
        name: "▶ Funktionstest starten"
        icon: mdi:play
        icon_height: 50px
        tap_action:
          action: call-service
          service: waveshare_relay.funktionstest_start
          service_data:
            laufzeit_s: 5
            pause_s: 0.25
            einmalig: true

      # ── Start (Dauertest) ──
      - type: button
        name: "🔁 Dauertest (Endlosschleife)"
        icon: mdi:repeat
        icon_height: 50px
        tap_action:
          action: call-service
          service: waveshare_relay.funktionstest_start
          service_data:
            laufzeit_s: 3
            pause_s: 0.5
            einmalig: false
          confirmation:
            text: Endlos-Funktionstest starten? Muss manuell gestoppt werden!

      # ── Stop ──
      - type: button
        name: "⏹ Funktionstest STOP"
        icon: mdi:stop
        icon_height: 50px
        tap_action:
          action: call-service
          service: waveshare_relay.funktionstest_stop
