funktionstest_start:
  name: Funktionstest starten
  description: >
    Startet einen One-Hot-Funktionstest: Jeder Kanal wird nacheinander ein-
    und wieder ausgeschaltet.
  fields:
    laufzeit_s:
      name: Laufzeit pro Kanal (s)
      description: Wie lange jedes Relais eingeschaltet bleibt.
      required: false
      default: 5
      selector:
        number:
          min: 0.1
          max: 300
          step: 0.1
          unit_of_measurement: s
    pause_s:
      name: Pause zwischen Kanälen (s)
      description: Wartezeit nach dem Ausschalten bevor der nächste Kanal drankommt.
      required: false
      default: 0.25
      selector:
        number:
          min: 0
          max: 60
          step: 0.05
          unit_of_measurement: s
    einmalig:
      name: Nur ein Durchlauf
      description: >
        Wenn aktiv, wird der Test nach einem kompletten Durchlauf beendet.
        Sonst Endlosschleife bis manuell gestoppt.
      required: false
      default: true
      selector:
        boolean:

funktionstest_stop:
  name: Funktionstest stoppen
  description: Stoppt einen laufenden Funktionstest und schaltet alle Relais aus.

statistik_zuruecksetzen:
  name: Statistik zurücksetzen
  description: Setzt alle Zähler und Dauer-Werte auf 0 zurück.

alle_aus:
  name: Alle Relais aus
  description: Schaltet alle Relais des konfigurierten Boards sofort aus.
